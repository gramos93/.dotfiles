# Restore term color
# set-option -sa terminal-overrides ",alacritty"
set -g default-terminal "tmux-256color"
set-option -sa terminal-features ",alacritty:RGB"

# Enable mouse globaly
set -g mouse on

# Start windowing and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set prefix 
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Vim keys to switch sessions (mirrors jmux's Ctrl-Shift-Up/Down)
bind-key j switch-client -n
bind-key k switch-client -p

# Lazygit popup
# jmux uses `prefix g` for its diff/info panel — lazygit moved to `prefix G`.
bind-key G popup -E -w 95% -h 95%  -d '#{pane_current_path}' lazygit

# ccmux agent picker popup (prefix a = agents)
bind-key a display-popup -E -w 80% -h 75% "ccmux"

# Tell TPM exactly where to install plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Set vi-mode
set-window-option -g mode-keys vi
# mod keybindings for copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# --- THEME CONFIGURATION ---
# Providing these stops the "invalid option" errors in your logs
set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_show_hostname 0
set -g @tokyo-night-tmux_show_battery_widget 1

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
